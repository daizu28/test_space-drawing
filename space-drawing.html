<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>空間お絵かき プロトタイプ</title>
  <!-- A-Frameという、HTMLだけで3D・ARが作れる仕組みを読み込みます -->
  <script src="https://aframe.io/releases/1.8.0/aframe.min.js"></script>
</head>
<body style="margin:0;">

  <!--
    ここから <a-scene> が「舞台」です。
    webxr の optionalFeatures に local-floor を書くと、
    Quest側で「ARで開始」ボタンが出るようになります。

    xr-mode-ui="XRMode: ar" が重要です。
    これがないと、ボタンを押しても普通のVRモード（真っ黒な背景）で
    始まってしまい、現実の部屋が見えません。

    (dom-overlayはQuestのブラウザで正式対応していないため使いません。
    代わりに「左トリガーで単語を切り替え、右グリップで置く」方式にしています。)
  -->
  <a-scene
    webxr="optionalFeatures: local-floor, hand-tracking;"
    xr-mode-ui="XRMode: ar">

    <!-- 左手のコントローラー。トリガーで「置く単語」を切り替えます -->
    <a-entity
      id="leftHand"
      oculus-touch-controls="hand: left"
      cycle-note-word>
      <!-- 今選ばれている単語が、左手の上に浮かんで見えます -->
      <a-entity id="wordPreview" text="value: TODO; color: white; align: center; width: 1.2;" position="0 0.08 0"></a-entity>
    </a-entity>

    <!-- 右手のコントローラー。トリガーで線を描き、グリップ（握るボタン）で付箋を置きます -->
    <a-entity
      id="rightHand"
      oculus-touch-controls="hand: right"
      draw-with-trigger
      place-note-with-grip>
    </a-entity>

    <!-- 描いた線をぜんぶここに入れていく「入れ物」 -->
    <a-entity id="drawings"></a-entity>

    <!-- 置いた付箋をぜんぶここに入れていく「入れ物」 -->
    <a-entity id="notes"></a-entity>

    <!-- 自分の視点（カメラ）。ARなので実際の部屋がそのまま背景になります -->
    <a-camera></a-camera>

  </a-scene>

  <script>
    /*
      ここが「お絵かき」の心臓部分です。
      やっていることはシンプルで、

      1. トリガー（人差し指のボタン）を押している間、
         コントローラーの位置を毎フレーム記録する
      2. さっきの位置と今の位置を、細い棒（線）でつなぐ
      3. それを描いた点の数だけ繰り返す

      これを高速で繰り返すと、手の動きが「線」として
      空間に残って見える、という仕組みです。
    */
    AFRAME.registerComponent('draw-with-trigger', {
      init: function () {
        this.isDrawing = false;
        this.previousPoint = null;

        // トリガーを押した瞬間
        this.el.addEventListener('triggerdown', () => {
          this.isDrawing = true;
          this.previousPoint = null; // 新しい線をここから開始
        });

        // トリガーを離した瞬間
        this.el.addEventListener('triggerup', () => {
          this.isDrawing = false;
          this.previousPoint = null;
        });
      },

      // tick は「毎フレーム自動で呼ばれる」特別な関数です
      tick: function () {
        if (!this.isDrawing) return;

        // 今のコントローラーの位置（現実の部屋の中でのxyz座標）を取得
        const currentPoint = new THREE.Vector3();
        this.el.object3D.getWorldPosition(currentPoint);

        if (this.previousPoint) {
          // 前の点と今の点が近すぎる場合は線を増やさない（カクカク防止）
          const distance = this.previousPoint.distanceTo(currentPoint);
          if (distance > 0.01) {
            this.drawSegment(this.previousPoint, currentPoint);
            this.previousPoint = currentPoint.clone();
          }
        } else {
          this.previousPoint = currentPoint.clone();
        }
      },

      // 2点間に短い棒（線）を1本追加する関数
      drawSegment: function (start, end) {
        const drawings = document.querySelector('#drawings');
        const segment = document.createElement('a-entity');

        segment.setAttribute('line', {
          start: `${start.x} ${start.y} ${start.z}`,
          end: `${end.x} ${end.y} ${end.z}`,
          color: '#FF5A5F' // 線の色。好きな色コードに変えてOK
        });

        drawings.appendChild(segment);
      }
    });


    /*
      ここが「単語を切り替える」機能です(左手担当)。
      やっていることはシンプルで、

      1. あらかじめ5つの単語を用意しておく
      2. 左手のトリガーを押すたびに、次の単語に切り替わる
      3. 今選ばれている単語は、左手の上に浮かぶ文字で確認できる
    */
    AFRAME.registerComponent('cycle-note-word', {
      init: function () {
        // ここに好きな単語を増やしたり変えたりしてOKです
        this.words = ['TODO', 'メモ', 'アイデア', '質問', '重要'];
        this.currentIndex = 0;

        // 今選ばれている単語を、どこからでも参照できるように
        // window(グローバルな置き場所)に保存しておきます
        window.currentNoteWord = this.words[this.currentIndex];

        const preview = this.el.querySelector('#wordPreview');

        this.el.addEventListener('triggerdown', () => {
          this.currentIndex = (this.currentIndex + 1) % this.words.length;
          window.currentNoteWord = this.words[this.currentIndex];
          preview.setAttribute('text', 'value', window.currentNoteWord);
        });
      }
    });

    /*
      ここが「付箋を置く」機能です(右手担当)。
      やっていることはシンプルで、

      1. 右手のグリップ(手のひらで握るボタン)を押す
      2. 今選ばれている単語(window.currentNoteWord)を読み取る
      3. 右手コントローラーの今の位置に、その単語を付箋として置く

      グリップはトリガー(人差し指)とは別の、握るボタンなので、
      線を描く動作とぶつかりません。
    */
    AFRAME.registerComponent('place-note-with-grip', {
      init: function () {
        this.el.addEventListener('gripdown', () => {
          this.placeNote(window.currentNoteWord || 'メモ');
        });
      },

      placeNote: function (text) {
        const position = new THREE.Vector3();
        this.el.object3D.getWorldPosition(position);

        // 付箋の入れ物になる entity を1つ作る
        const note = document.createElement('a-entity');
        note.setAttribute('position', `${position.x} ${position.y} ${position.z}`);

        // 付箋の背景(黄色い板)
        note.setAttribute('geometry', 'primitive: plane; width: 0.4; height: 0.3');
        note.setAttribute('material', 'color: #FFF176; side: double');

        // 常にユーザーの方を向くようにする(billboard的な動き)
        note.setAttribute('look-at', '[camera]');

        // 文字本体
        const textEl = document.createElement('a-entity');
        textEl.setAttribute('text', `value: ${text}; color: #333; width: 0.7; align: center; wrapCount: 20;`);
        textEl.setAttribute('position', '0 0 0.01'); // 板より少し手前に文字を置く
        note.appendChild(textEl);

        document.querySelector('#notes').appendChild(note);
      }
    });
  </script>

</body>
</html>
